            { q: "15. 面对读研期间的各种繁琐报销流程：", options: [ { text: "被各种贴票、签字折磨得痛不欲生，经常垫钱。", type: "A" }, { text: "仔细阅读财务规定，整理得井井有条，一次性通过。", type: "E" }, { text: "随缘报销，丢三落四，甚至有些小钱懒得报了。", type: "B" }, { text: "让师弟师妹去跑，或者我根本不缺这点经费。", type: "C" }, { text: "找各种同学凑票，主打一个绝对不能亏本。", type: "D" } ] },
            { q: "16. 提到“师门传承”，你想到的是：", options: [ { text: "一代代传下来的屎山代码和祖传报错。", type: "D" }, { text: "导师对每一届的连环压榨和PUA语录。", type: "A" }, { text: "我是开山大弟子/扛把子，我就是传承本身。", type: "C" }, { text: "聚餐、唱K、师兄师姐找工作内推经验。", type: "B" }, { text: "规范的文档、交接清单和实验室规章制度。", type: "E" } ] },
            { q: "17. 当你需要学习一个全新的工具/软件时：", options: [ { text: "看一眼官方API文档，半小时后就开始写高级脚本了。", type: "C" }, { text: "找个B站视频，开2倍速看，能跟着抄就行。", type: "D" }, { text: "一边哭一边学，因为明天晚上就要交结果。", type: "A" }, { text: "制定学习计划，每天学一小时，周末不学。", type: "E" }, { text: "买本教材，看了前言就束之高阁，等哪天有心情再说。", type: "B" } ] },
            { q: "18. 对待盲审/查重，你的态度是：", options: [ { text: "成竹在胸，我的工作量和创新点随便评都是优。", type: "C" }, { text: "提心吊胆，四处烧香拜佛求菩萨保佑。", type: "B" }, { text: "焦虑到失眠，天天梦到盲审被毙掉延毕。", type: "A" }, { text: "熟练运用各种替换同义词、插图大法，强行过关。", type: "D" }, { text: "按学校要求修改，只要按照标准写了，挂不了。", type: "E" } ] },
            { q: "19. 你在实验室的固定资产主要是：", options: [ { text: "各种抱枕、行军床、眼罩、咖啡罐头（几乎住这了）。", type: "A" }, { text: "顶配机械键盘、双屏显示器、人体工学椅。", type: "C" }, { text: "就一个水杯，随时可以提桶跑路。", type: "E" }, { text: "一堆打印废掉的A4纸和几本从来没看过的书。", type: "D" }, { text: "我连固定工位都没有/很少去。", type: "B" } ] },
            { q: "20. 听到别的同学发了很好的顶会/期刊：", options: [ { text: "这不就是我昨晚帮他改的那篇吗？", type: "C" }, { text: "羡慕嫉妒恨，然后看看自己一坨屎的数据继续emo。", type: "A" }, { text: "哦，挺厉害的。今天中午去哪吃饭？", type: "E" }, { text: "赶紧去沾沾喜气，求他传授一点水文的玄学经验。", type: "D" }, { text: "与我无关，我只要够毕业要求的那一篇C刊就行了。", type: "B" } ] },
            { q: "21. 对待同门之间的竞争（比如抢资源、抢第一作者）：", options: [ { text: "我不参与竞争，我直接碾压，一作我拿的心安理得。", type: "C" }, { text: "佛系，你们抢吧，别拉踩我就行。", type: "B" }, { text: "很抗拒但又不敢发声，只能背地里生闷气。", type: "A" }, { text: "根据我对课题的贡献度严格划分，该我的就是我的，不退让。", type: "E" }, { text: "我能不能只挂个二三作毕业啊，我不想干活。", type: "D" } ] },
            { q: "22. 写毕业论文致谢时，你的真实心情是：", options: [ { text: "感谢我自己这三年来坚强的牛马精神没有死掉。", type: "A" }, { text: "感谢各种AI工具、知网前人、还有Ctrl+C。", type: "D" }, { text: "导师真好，师门真好，这三年很幸运很开心！", type: "B" }, { text: "公事公办的走个过场，感谢一圈格式化名单。", type: "E" }, { text: "写什么致谢，导师估计还要反过来感谢我带活了课题组。", type: "C" } ] },
            { q: "23. 如果可以选择，时光倒流回大四，你还会考研吗？", options: [ { text: "绝对不会！谁读谁是狗！(汪汪)", type: "A" }, { text: "无所谓，反正去哪都是打卡上班。", type: "E" }, { text: "会啊，读研挺轻松的，还有缓冲期。", type: "B" }, { text: "会，我想去更好的学校，发更牛的文章。", type: "C" }, { text: "不好说，看哪种选择更能让我光明正大地混日子。", type: "D" } ] },
            { q: "24. 遇到假期（如国庆、五一），你的安排：", options: [ { text: "导师不发话不敢走，或者带个电脑回家继续干活。", type: "A" }, { text: "早就订好机票了，不回微信，天王老子来了我也在度假。", type: "E" }, { text: "顺带去参加个国际顶会，或者去知名企业做交流。", type: "C" }, { text: "回家睡大觉，在各大景点躺平。", type: "B" }, { text: "只要学校不赶人，我就在宿舍躺7天。", type: "D" } ] },
            { q: "25. 你的邮箱里平时最多的是什么邮件？", options: [ { text: "各大期刊发来的审稿邀请（求我当审稿人）。", type: "C" }, { text: "导师的各种push、任务分配和催命连环call。", type: "A" }, { text: "知网/ResearchGate的推送，从来没点开过。", type: "D" }, { text: "求职投递的自动回复和各种推销邮件。", type: "E" }, { text: "学校教务处的各种常规通知邮件。", type: "B" } ] },
            { q: "26. 找工作/秋招时，你的优势是：", options: [ { text: "手握数篇顶会，被各大厂/高校疯抢，我选offer。", type: "C" }, { text: "项目经验极度丰富（全是被导师逼出来的）。", type: "A" }, { text: "面试极其冷静理智，对答如流，不卑不亢。", type: "E" }, { text: "没有优势，只有玄学运气和一些东拼西凑的杂技。", type: "D" }, { text: "时间充裕，可以海投几千份简历慢慢挑。", type: "B" } ] },
            { q: "27. 你觉得读研带给你最大的改变是：", options: [ { text: "心理承受能力大幅提高（其实是被摧残到麻木）。", type: "A" }, { text: "获得了极强的学术视野和独立解决问题的能力。", type: "C" }, { text: "看清了职场和人际关系的本质，更加成熟淡定。", type: "E" }, { text: "掌握了一套糊弄学原理和极限生存法则。", type: "D" }, { text: "好像没什么改变，就是老了三岁。", type: "B" } ] },
            { q: "28. 对于“延毕”这个词，你的反应是：", options: [ { text: "日常焦虑来源，做梦都在害怕这个词。", type: "A" }, { text: "跟我无关的词汇，我不提前毕业就算客气了。", type: "C" }, { text: "如果导师给钱多，延就延呗（但必须按合同来）。", type: "E" }, { text: "一直在边缘疯狂试探，全看盲审老师手下留情。", type: "D" }, { text: "随遇而安，延就延吧，正好不知道毕业去干嘛。", type: "B" } ] },
            { q: "29. 导师平时是怎么称呼你的？", options: [ { text: "小王/小李，语气和蔼，但好几个月叫错我的名字。", type: "B" }, { text: "王博/李神，遇到难题甚至还会加个“哥”。", type: "C" }, { text: "直呼大名，伴随着一堆催办事项，像叫一个保洁阿姨。", type: "A" }, { text: "就正常的连名带姓，交代工作。", type: "E" }, { text: "“那个谁，你这论文到底能不能写了？！”", type: "D" } ] },
            { q: "30. 最后一题，做完这个测试你打算去干嘛？", options: [ { text: "还能干嘛？导师刚刚又找我了，继续去搬砖。", type: "A" }, { text: "下班！立刻！关机走人！", type: "E" }, { text: "挺准的，分享给师弟师妹们乐呵一下。", type: "C" }, { text: "找个舒服的姿势躺下刷手机。", type: "B" }, { text: "复制粘贴测试结果发个朋友圈证明我还活着。", type: "D" } ] }
        ];

        // --- 状态管理 ---
        let step = 0;
        let scores = { A: 0, B: 0, C: 0, D: 0, E: 0 };
        let answersHistory = []; // 新增：记录用户的选项历史，用于“上一题”撤销
        let finalResult = null;

        const appDiv = document.getElementById('app');

        // --- 核心逻辑 ---
        function render() {
            if (step === 0) {
                renderStartScreen();
            } else if (step >= 1 && step <= QUESTIONS.length) {
                renderQuestionScreen();
            } else if (step === 31) {
                renderLoadingScreen();
                // 模拟加载计算过程
                setTimeout(() => {
                    calculateResult();
                    renderResultScreen();
                }, 2000);
            } else if (step === 32) {
                renderResultScreen();
            }
        }

        function handleAnswer(type) {
            answersHistory.push(type); // 记录当前选择
            scores[type]++;
            if (step < QUESTIONS.length) {
                step++;
            } else {
                step = 31; // 进入加载页面
            }
            render();
        }

        function goBack() {
            if (step > 1) {
                const lastAnswer = answersHistory.pop(); // 弹出最后一次选择
                scores[lastAnswer]--; // 减去相应的分数
                step--; // 回退步数
                render();
            }
        }

        function calculateResult() {
            let maxScore = -1;
            let winningType = 'A';
            for (const [type, score] of Object.entries(scores)) {
                if (score > maxScore) {
                    maxScore = score;
                    winningType = type;
                }
            }
            finalResult = winningType;
            step = 32;
        }

        function restart() {
            scores = { A: 0, B: 0, C: 0, D: 0, E: 0 };
            answersHistory = []; // 重置历史记录
            step = 0;
            finalResult = null;
            render();
        }

        function copyResult() {
            const resultData = RESULT_TYPES[finalResult];
            const text = `【研究生特质测试】\n我的结果是：${resultData.title}（${resultData.subtitle}）\n🎓精神状态：${resultData.stats.sanity}\n✂️发量状态：${resultData.stats.hair}\n来测测你是哪种科研体质吧！`;
            
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                console.error('复制失败', err);
                alert("复制失败，请手动截图分享~");
            }
            document.body.removeChild(textArea);
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', 'translate-y-[-20px]');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-[-20px]');
            }, 3000);
        }

        // --- 渲染函数 ---
        function renderStartScreen() {
            appDiv.innerHTML = `
                <div class="fade-in bg-gradient-to-br from-indigo-50 via-white to-purple-50 min-h-screen w-full flex items-center justify-center p-4">
                    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-indigo-100 p-8 text-center">
                        <div class="mx-auto w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mb-6 text-indigo-600">
                            <div class="w-10 h-10">${icons.book}</div>
                        </div>
                        <h1 class="text-3xl font-bold text-gray-800 mb-2">研究生 GBTI 测试</h1>
                        <p class="text-indigo-600 font-medium mb-6">Graduate Behavior Type Indicator</p>
                        <p class="text-gray-600 mb-8 text-sm leading-relaxed">
                            全网超火的研究生特质测试！<br/>
                            面对导师的PUA、跑不出的数据、头秃的论文，你是哪种生存流派？<br/>
                            30道直击灵魂的送命题，测出你的真实科研底色。
                        </p>
                        <button onclick="handleAnswer('start')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl transition duration-200 transform hover:scale-[1.02] active:scale-95 shadow-lg flex justify-center items-center gap-2">
                            开始接受拷问 ${icons.chevronRight}
                        </button>
                    </div>
                </div>
            `;
            // 处理首屏点击，由于按钮调用了 handleAnswer，这里拦截一下重置 logic
            window.handleAnswer = function(type) {
                if (type === 'start') {
                    step = 1;
                    render();
                } else {
                    answersHistory.push(type);
                    scores[type]++;
                    if (step < QUESTIONS.length) {
                        step++;
                    } else {
                        step = 31;
                    }
                    render();
                }
            }
        }

        function renderQuestionScreen() {
            const currentQ = QUESTIONS[step - 1];
            const progressPercentage = (step / QUESTIONS.length) * 100;
            
            const optionsHtml = currentQ.options.map((opt, index) => `
                <button onclick="handleAnswer('${opt.type}')" class="w-full text-left p-4 rounded-xl border-2 border-gray-100 hover:border-indigo-400 hover:bg-indigo-50 text-gray-700 hover:text-indigo-800 font-medium transition-all duration-200 active:scale-[0.98] group flex items-center">
                    <span class="w-8 h-8 flex-none rounded-lg bg-gray-100 group-hover:bg-indigo-200 group-hover:text-indigo-800 flex items-center justify-center text-sm mr-3 font-bold text-gray-500 transition-colors">
                        ${String.fromCharCode(65 + index)}
                    </span>
                    <span>${opt.text}</span>
                </button>
            `).join('');

            appDiv.innerHTML = `
                <div class="fade-in bg-slate-50 min-h-screen w-full flex flex-col p-4 md:p-8 items-center justify-center relative">
                    
                    <!-- 左上角重新开始按钮 -->
                    <button onclick="restart()" class="absolute top-4 left-4 md:top-8 md:left-8 flex items-center gap-1 text-gray-500 hover:text-indigo-600 transition-colors font-medium text-sm bg-white/80 backdrop-blur px-3 py-2 rounded-lg border border-gray-200 shadow-sm hover:shadow">
                        ${icons.home} 首页
                    </button>

                    <div class="max-w-xl w-full mt-12 md:mt-0">
                        <div class="mb-8">
                            <div class="flex justify-between items-end mb-2">
                                <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">答题进度</span>
                                <span class="text-lg font-black text-indigo-600">${step} <span class="text-sm text-gray-400 font-medium">/ 30</span></span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
                                <div class="bg-indigo-600 h-2.5 rounded-full transition-all duration-500 ease-out" style="width: ${progressPercentage}%"></div>
                            </div>
                        </div>
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8 mb-4">
                            <h2 class="text-xl md:text-2xl font-bold text-gray-800 mb-8 leading-snug">
                                ${currentQ.q}
                            </h2>
                            <div class="space-y-3">
                                ${optionsHtml}
                            </div>
                            
                            <!-- 上一题按钮 -->
                            ${step > 1 ? `
                            <div class="mt-6 pt-6 border-t border-gray-50 flex justify-start">
                                <button onclick="goBack()" class="flex items-center gap-1 text-gray-500 hover:text-indigo-600 transition font-medium text-sm px-3 py-2 rounded-lg hover:bg-indigo-50 -ml-3">
                                    ${icons.arrowLeft} 上一题
                                </button>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderLoadingScreen() {
            appDiv.innerHTML = `
                <div class="fade-in min-h-screen w-full bg-gradient-to-br from-indigo-50 to-purple-50 flex flex-col items-center justify-center p-4">
                    <div class="w-16 h-16 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
                    <h2 class="text-xl font-bold text-gray-700">正在生成导师评价表...</h2>
                    <p class="text-gray-500 mt-2 text-sm">正在计算你的掉发速度与延毕概率...</p>
                </div>
            `;
        }

        function renderResultScreen() {
            const resultInfo = RESULT_TYPES[finalResult];
            appDiv.innerHTML = `
                <div class="fade-in min-h-screen w-full bg-slate-50 flex items-center justify-center p-4 md:p-8 pb-16">
                    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden">
                        <div class="p-8 pb-10 text-center ${resultInfo.colorClass} relative overflow-hidden">
                            <div class="absolute top-[-20%] right-[-10%] w-32 h-32 bg-white opacity-20 rounded-full blur-xl"></div>
                            <div class="absolute bottom-[-10%] left-[-10%] w-24 h-24 bg-white opacity-20 rounded-full blur-lg"></div>
                            
                            <div class="bg-white/90 p-4 rounded-full inline-block mb-4 shadow-sm backdrop-blur-sm relative z-10 w-24 h-24 flex items-center justify-center ${resultInfo.iconColor}">
                                ${resultInfo.icon}
                            </div>
                            <h2 class="text-sm font-bold tracking-widest uppercase mb-1 opacity-80">您的检测结果是</h2>
                            <h1 class="text-4xl font-extrabold mb-2 relative z-10">${resultInfo.title}</h1>
                            <p class="text-lg font-medium opacity-90">${resultInfo.subtitle}</p>
                        </div>

                        <div class="p-8">
                            <div class="mb-6">
                                <h3 class="text-sm font-bold text-gray-400 uppercase mb-2">特质解析</h3>
                                <p class="text-gray-700 leading-relaxed text-justify">
                                    ${resultInfo.description}
                                </p>
                            </div>

                            <div class="bg-gray-50 rounded-xl p-4 mb-8 border border-gray-100">
                                <h3 class="text-sm font-bold text-gray-500 mb-3 border-b pb-2">📊 核心雷达面板</h3>
                                <ul class="space-y-3">
                                    <li class="flex justify-between items-center">
                                        <span class="text-gray-600">🧠 精神状态</span>
                                        <span class="font-semibold text-gray-800">${resultInfo.stats.sanity}</span>
                                    </li>
                                    <li class="flex justify-between items-center">
                                        <span class="text-gray-600">✂️ 发量剩余</span>
                                        <span class="font-semibold text-gray-800">${resultInfo.stats.hair}</span>
                                    </li>
                                    <li class="flex justify-between items-center">
                                        <span class="text-gray-600">🎓 毕业前景</span>
                                        <span class="font-semibold text-gray-800">${resultInfo.stats.graduation}</span>
                                    </li>
                                    <li class="flex justify-between items-center">
                                        <span class="text-gray-600">🗣️ 口头禅</span>
                                        <span class="font-semibold text-indigo-600 bg-indigo-50 px-2 py-1 rounded text-sm">"${resultInfo.stats.catchphrase}"</span>
                                    </li>
                                </ul>
                            </div>

                            <div class="flex gap-4">
                                <button onclick="copyResult()" class="flex-1 bg-gray-900 hover:bg-gray-800 text-white font-medium py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition">
                                    <div class="w-4 h-4">${icons.share}</div> 分享结果
                                </button>
                                <button onclick="restart()" class="flex-none bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-3 px-4 rounded-xl flex items-center justify-center transition" title="重新测试">
                                    <div class="w-5 h-5">${icons.rotate}</div>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 初始化渲染
        render();

    </script>
</body>
</html>
